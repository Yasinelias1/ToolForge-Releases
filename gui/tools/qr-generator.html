<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Code Generator – ToolForge</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-deep:        #07050f;
      --bg-mid:         #0d0b1e;
      --glass-bg:       rgba(255, 255, 255, 0.04);
      --glass-border:   rgba(255, 255, 255, 0.10);
      --glass-hover:    rgba(255, 255, 255, 0.07);
      --purple:         #a855f7;
      --purple-light:   #c084fc;
      --cyan:           #22d3ee;
      --cyan-light:     #67e8f9;
      --white:          #f8fafc;
      --muted:          #94a3b8;
      --muted-light:    #cbd5e1;
      --input-bg:       rgba(255,255,255,0.06);
      --input-border:   rgba(255,255,255,0.12);
      --input-focus:    rgba(168,85,247,0.5);
      --shadow-lg:      0 25px 60px rgba(0,0,0,0.6);
      --shadow-glow:    0 0 60px rgba(168,85,247,0.18), 0 0 100px rgba(34,211,238,0.10);
      --radius-xl:      20px;
      --radius-lg:      14px;
      --radius-md:      10px;
      --transition:     0.25s cubic-bezier(0.4,0,0.2,1);
    }

    html { font-size: 16px; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-deep);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(168,85,247,0.22) 0%, transparent 70%);
      top: -150px; left: -150px;
      animation: orb1 12s ease-in-out infinite alternate;
    }
    body::after {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(34,211,238,0.18) 0%, transparent 70%);
      bottom: -100px; right: -100px;
      animation: orb2 10s ease-in-out infinite alternate;
    }

    @keyframes orb1 {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(60px,40px) scale(1.15); }
    }
    @keyframes orb2 {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(-50px,-30px) scale(1.12); }
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 900px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-xl);
      backdrop-filter: blur(32px) saturate(180%);
      -webkit-backdrop-filter: blur(32px) saturate(180%);
      box-shadow: var(--shadow-lg), var(--shadow-glow);
      padding: 48px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      animation: fadeUp 0.6s cubic-bezier(0.4,0,0.2,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .header {
      grid-column: 1 / -1;
      text-align: center;
      margin-bottom: -16px;
    }
    .header-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--cyan);
      background: rgba(34,211,238,0.08);
      border: 1px solid rgba(34,211,238,0.2);
      border-radius: 100px;
      padding: 5px 14px;
      margin-bottom: 16px;
    }
    .header-badge svg { width:14px; height:14px; }
    h1 {
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 800;
      background: linear-gradient(135deg, var(--purple-light) 0%, var(--cyan) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.15;
      letter-spacing: -0.02em;
    }
    .header p {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 400;
    }

    .divider {
      grid-column: 1 / -1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--glass-border), transparent);
      margin: -24px 0;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted-light);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    label .label-icon {
      width: 16px; height: 16px;
      opacity: 0.7;
    }

    .input-wrapper {
      position: relative;
    }
    textarea, input[type="text"] {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: var(--radius-lg);
      color: var(--white);
      font-family: inherit;
      font-size: 0.95rem;
      padding: 14px 16px;
      resize: vertical;
      transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
      outline: none;
      min-height: 100px;
    }
    textarea:focus, input[type="text"]:focus {
      border-color: var(--purple);
      background: rgba(168,85,247,0.06);
      box-shadow: 0 0 0 3px var(--input-focus);
    }
    textarea::placeholder { color: var(--muted); }

    .char-counter {
      position: absolute;
      bottom: 10px;
      right: 12px;
      font-size: 0.72rem;
      color: var(--muted);
      pointer-events: none;
    }

    .type-toggle {
      display: flex;
      gap: 8px;
    }
    .type-btn {
      flex: 1;
      padding: 8px;
      border-radius: var(--radius-md);
      border: 1px solid var(--glass-border);
      background: transparent;
      color: var(--muted);
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .type-btn svg { width:14px; height:14px; }
    .type-btn:hover {
      background: var(--glass-hover);
      color: var(--white);
      border-color: rgba(255,255,255,0.2);
    }
    .type-btn.active {
      background: linear-gradient(135deg, rgba(168,85,247,0.25), rgba(34,211,238,0.15));
      border-color: var(--purple);
      color: var(--purple-light);
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(
        to right,
        var(--purple) 0%,
        var(--cyan) var(--pct, 50%),
        rgba(255,255,255,0.12) var(--pct, 50%)
      );
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--purple), var(--cyan));
      box-shadow: 0 0 0 3px rgba(168,85,247,0.3), 0 4px 12px rgba(0,0,0,0.4);
      cursor: grab;
      transition: box-shadow var(--transition), transform var(--transition);
    }
    .slider-value {
      min-width: 52px;
      text-align: right;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--purple-light);
    }

    .color-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .color-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .color-field label {
      font-size: 0.72rem;
    }
    .color-picker-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: var(--radius-md);
      padding: 8px 12px;
      cursor: pointer;
      transition: border-color var(--transition), background var(--transition);
    }
    .color-picker-wrap:hover {
      border-color: rgba(255,255,255,0.22);
      background: var(--glass-hover);
    }
    input[type="color"] {
      width: 28px; height: 28px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: none;
      padding: 0;
      flex-shrink: 0;
    }
    input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
    input[type="color"]::-webkit-color-swatch {
      border: none;
      border-radius: 5px;
    }
    .color-hex {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--muted-light);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.04em;
    }

    .ec-row {
      display: flex;
      gap: 8px;
    }
    .ec-btn {
      flex: 1;
      padding: 7px 4px;
      border-radius: var(--radius-md);
      border: 1px solid var(--glass-border);
      background: transparent;
      color: var(--muted);
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
    }
    .ec-btn:hover {
      background: var(--glass-hover);
      color: var(--white);
    }
    .ec-btn.active {
      background: linear-gradient(135deg, rgba(168,85,247,0.25), rgba(34,211,238,0.15));
      border-color: var(--cyan);
      color: var(--cyan-light);
    }

    .btn-generate {
      width: 100%;
      padding: 15px;
      border-radius: var(--radius-lg);
      border: none;
      background: linear-gradient(135deg, var(--purple) 0%, #6366f1 50%, var(--cyan) 100%);
      background-size: 200% 200%;
      color: #fff;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform var(--transition), box-shadow var(--transition), background-position var(--transition);
      box-shadow: 0 6px 30px rgba(168,85,247,0.45);
      letter-spacing: 0.02em;
    }
    .btn-generate:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 40px rgba(168,85,247,0.6);
      background-position: right center;
    }

    .preview-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .qr-container {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      position: relative;
    }

    .qr-frame {
      position: relative;
      border-radius: var(--radius-xl);
      padding: 24px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--glass-border);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 200px;
      min-height: 200px;
      transition: box-shadow var(--transition);
    }
    .qr-frame.has-qr {
      box-shadow: 0 0 60px rgba(168,85,247,0.15), 0 0 120px rgba(34,211,238,0.08);
    }

    .qr-frame::before,
    .qr-frame::after {
      content: '';
      position: absolute;
      width: 24px; height: 24px;
      border-radius: 3px;
      pointer-events: none;
    }
    .qr-frame::before {
      top: -1px; left: -1px;
      border-top: 2px solid var(--purple);
      border-left: 2px solid var(--purple);
      border-top-left-radius: var(--radius-xl);
    }
    .qr-frame::after {
      bottom: -1px; right: -1px;
      border-bottom: 2px solid var(--cyan);
      border-right: 2px solid var(--cyan);
      border-bottom-right-radius: var(--radius-xl);
    }

    #qr-output {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }
    #qr-output img {
      border-radius: 8px;
      display: block;
      transition: opacity 0.3s ease, transform 0.3s ease;
      object-fit: contain;
      max-width: 100%;
      max-height: 100%;
    }

    .qr-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      text-align: center;
    }
    .qr-placeholder svg {
      width: 64px; height: 64px;
      opacity: 0.25;
    }
    .qr-placeholder p {
      font-size: 0.85rem;
      max-width: 140px;
      line-height: 1.5;
    }

    .qr-stats {
      display: flex;
      gap: 16px;
      width: 100%;
    }
    .stat {
      flex: 1;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      padding: 12px;
      text-align: center;
    }
    .stat-value {
      font-size: 1.05rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--purple-light), var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .stat-label {
      font-size: 0.68rem;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 2px;
    }

    .btn-download {
      width: 100%;
      padding: 13px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      color: var(--white);
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all var(--transition);
      position: relative;
      overflow: hidden;
    }
    .btn-download:hover {
      border-color: var(--cyan);
      color: var(--cyan-light);
      box-shadow: 0 4px 20px rgba(34,211,238,0.2);
    }
    .btn-download:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(168,85,247,0.9);
      backdrop-filter: blur(16px);
      color: #fff;
      padding: 12px 24px;
      border-radius: 100px;
      font-size: 0.85rem;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s ease;
      z-index: 100;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 680px) {
      .card {
        grid-template-columns: 1fr;
        padding: 28px 20px;
        gap: 28px;
      }
      .divider { display: none; }
      .header { margin-bottom: 0; }
    }
  
    .back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      color: #94a3b8;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.25s ease;
      z-index: 999;
    }
    .back-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(168, 85, 247, 0.4);
      color: #f1f5f9;
      transform: translateX(-4px);
    }
  </style>
</head>
<body>
  <a href="../ToolForge.html#tools" class="back-btn">⬅ Zurück</a>

<div class="card">
  <!-- Header -->
  <div class="header">
    <div class="header-badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      QR Code Generator
    </div>
    <h1>QR-Codes generieren</h1>
    <p>Erstelle aus beliebigem Text oder einer URL einen scannbaren QR-Code — offline &amp; direkt.</p>
  </div>

  <div class="divider"></div>

  <!-- Left: Controls -->
  <div class="controls">

    <!-- Type toggle -->
    <div class="field-group">
      <label>Eingabetyp</label>
      <div class="type-toggle">
        <button class="type-btn active" data-type="text" onclick="setType('text', this)">
          Text
        </button>
        <button class="type-btn" data-type="url" onclick="setType('url', this)">
          URL
        </button>
        <button class="type-btn" data-type="wifi" onclick="setType('wifi', this)">
          WLAN
        </button>
        <button class="type-btn" data-type="email" onclick="setType('email', this)">
          E-Mail
        </button>
        <button class="type-btn" data-type="file" onclick="setType('file', this)">
          Datei
        </button>
      </div>
    </div>

    <!-- Dynamic input area -->
    <div class="field-group" id="input-area">
      <label>Inhalt</label>
      <div class="input-wrapper">
        <textarea id="qr-input" placeholder="Text oder Link hier einfügen…" oninput="onInput()" maxlength="2000"></textarea>
        <span class="char-counter"><span id="char-count">0</span>/2000</span>
      </div>
    </div>

    <!-- File sharing fields -->
    <div id="file-fields" style="display:none; flex-direction:column; gap:14px;">
      <div class="field-group">
        <label>Datei zum Verschicken auswählen</label>
        <button class="btn-download" id="select-file-btn" onclick="selectSharingFile()" style="margin: 0; border-color: var(--purple); background: var(--input-bg);">
          📁 Datei auswählen
        </button>
        <div style="margin-top:10px; display:flex; align-items:center; gap:8px;">
          <input type="checkbox" id="share-internet-check" onchange="onShareModeChange()" style="width:16px; height:16px; accent-color:var(--purple); cursor:pointer;" />
          <label for="share-internet-check" style="text-transform:none; font-size:0.82rem; font-weight:500; color:var(--muted-light); cursor:pointer; user-select:none; display:inline-flex; align-items:center; gap:4px; margin:0;">
            ☁️ Über das Internet teilen (für Mobilfunk/LTE)
          </label>
        </div>
        <div id="file-info-box" style="display:none; margin-top:8px; padding:12px; background:rgba(255,255,255,0.03); border:1px dashed var(--glass-border); border-radius:10px;">
          <p id="file-info-name" style="font-size:0.9rem; font-weight:600; color:var(--white); word-break:break-all;"></p>
          <p id="file-info-size" style="font-size:0.75rem; color:var(--muted); margin-top:4px;"></p>
        </div>
      </div>
    </div>

    <!-- Wi-Fi fields -->
    <div id="wifi-fields" style="display:none; flex-direction:column; gap:14px;">
      <div class="field-group">
        <label>Netzwerkname (SSID)</label>
        <input type="text" id="wifi-ssid" placeholder="MeinNetzwerk" oninput="onInput()" />
      </div>
      <div class="field-group">
        <label>Passwort</label>
        <input type="text" id="wifi-pass" placeholder="Passwort" oninput="onInput()" />
      </div>
      <div class="field-group">
        <label>Verschlüsselung</label>
        <div class="ec-row">
          <button class="ec-btn active" onclick="setWifiSec('WPA',this)">WPA/WPA2</button>
          <button class="ec-btn" onclick="setWifiSec('WEP',this)">WEP</button>
          <button class="ec-btn" onclick="setWifiSec('',this)">Offen</button>
        </div>
      </div>
    </div>

    <!-- Email fields -->
    <div id="email-fields" style="display:none; flex-direction:column; gap:14px;">
      <div class="field-group">
        <label>Empfängeradresse</label>
        <input type="text" id="email-to" placeholder="hallo@example.com" oninput="onInput()" />
      </div>
      <div class="field-group">
        <label>Betreff</label>
        <input type="text" id="email-sub" placeholder="Betreff…" oninput="onInput()" />
      </div>
    </div>

    <!-- Size slider -->
    <div class="field-group">
      <label>Größe</label>
      <div class="slider-row">
        <input type="range" id="qr-size" min="100" max="500" value="240" step="10"
               oninput="updateSlider(this); onInput()" />
        <span class="slider-value"><span id="size-val">240</span>px</span>
      </div>
    </div>

    <!-- Colors -->
    <div class="field-group">
      <label>Farben</label>
      <div class="color-row">
        <div class="color-field">
          <label>Vordergrund</label>
          <div class="color-picker-wrap" onclick="document.getElementById('fg-color').click()">
            <input type="color" id="fg-color" value="#000000" oninput="updateColorHex('fg'); onInput()" />
            <span class="color-hex" id="fg-hex">#000000</span>
          </div>
        </div>
        <div class="color-field">
          <label>Hintergrund</label>
          <div class="color-picker-wrap" onclick="document.getElementById('bg-color').click()">
            <input type="color" id="bg-color" value="#ffffff" oninput="updateColorHex('bg'); onInput()" />
            <span class="color-hex" id="bg-hex">#FFFFFF</span>
          </div>
        </div>
      </div>
    </div>

    <button class="btn-generate" onclick="generateQR()">
      QR-Code generieren
    </button>
  </div>

  <!-- Right: Preview -->
  <div class="preview-panel">
    <div class="qr-container">
      <div class="qr-frame" id="qr-frame">
        <div id="qr-output">
          <div class="qr-placeholder" id="placeholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
              <rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/>
              <rect x="3" y="14" width="7" height="7" rx="1.5"/>
              <rect x="5" y="5" width="3" height="3" rx="0.5" fill="currentColor" stroke="none"/>
              <rect x="16" y="5" width="3" height="3" rx="0.5" fill="currentColor" stroke="none"/>
              <rect x="5" y="16" width="3" height="3" rx="0.5" fill="currentColor" stroke="none"/>
              <path d="M14 14h2v2h-2zM16 16h2v2h-2zM18 14h2v2h-2zM14 18h2v2h-2zM18 18h2v2h-2z" fill="currentColor" stroke="none"/>
            </svg>
            <p>Dein QR-Code erscheint hier</p>
          </div>
        </div>
      </div>
    </div>

    <div class="qr-stats">
      <div class="stat">
        <div class="stat-value" id="stat-size">—</div>
        <div class="stat-label">Größe</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="stat-chars">—</div>
        <div class="stat-label">Zeichen</div>
      </div>
    </div>

    <div style="margin-top: 14px; margin-bottom: 8px;">
      <span style="font-size: 12px; color: var(--text-muted); font-weight: 600; display: block; margin-bottom: 6px;">Dateiname (ohne Endung)</span>
      <input type="text" id="qr-filename" placeholder="z.B. mein-qrcode" style="width: 100%; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 13px; font-family: inherit; outline: none;" />
    </div>
    <button class="btn-download" id="download-btn" disabled onclick="downloadQR()">
      <span>Speichern unter (PNG)</span>
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let currentType   = 'text';
  let currentWifiSec = 'WPA';
  let debounceTimer = null;
  let hasQR         = false;

  updateSlider(document.getElementById('qr-size'));

  function setType(type, btn) {
    currentType = type;
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const textarea   = document.getElementById('qr-input');
    const wifiFields = document.getElementById('wifi-fields');
    const emailFields = document.getElementById('email-fields');
    const fileFields  = document.getElementById('file-fields');
    const inputArea  = document.getElementById('input-area');

    wifiFields.style.display  = 'none';
    emailFields.style.display = 'none';
    fileFields.style.display  = 'none';
    inputArea.style.display   = 'flex';

    if (type === 'wifi') {
      inputArea.style.display  = 'none';
      wifiFields.style.display = 'flex';
    } else if (type === 'email') {
      inputArea.style.display   = 'none';
      emailFields.style.display = 'flex';
    } else if (type === 'file') {
      inputArea.style.display  = 'none';
      fileFields.style.display = 'flex';
    } else {
      textarea.placeholder = type === 'url' ? 'https://example.com' : 'Text hier eingeben…';
    }
    onInput();
  }

  function setWifiSec(sec, btn) {
    currentWifiSec = sec;
    document.querySelectorAll('#wifi-fields .ec-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    onInput();
  }

  function updateColorHex(which) {
    const input = document.getElementById(which === 'fg' ? 'fg-color' : 'bg-color');
    document.getElementById(which + '-hex').textContent = input.value.toUpperCase();
  }

  function updateSlider(el) {
    const min = +el.min, max = +el.max, val = +el.value;
    const pct = ((val - min) / (max - min)) * 100;
    el.style.setProperty('--pct', pct + '%');
    document.getElementById('size-val').textContent = val;
  }

  let sharedFileUrl = '';
  let lastSelectedFilePath = '';

  function selectSharingFile() {
    if (typeof pywebview === 'undefined') return;
    pywebview.api.select_file(JSON.stringify([["Alle Dateien", "*.*"]])).then(filePath => {
      if (!filePath) return;
      lastSelectedFilePath = filePath;
      triggerFileSharing();
    });
  }

  function onShareModeChange() {
    if (lastSelectedFilePath) {
      triggerFileSharing();
    }
  }

  function triggerFileSharing() {
    if (!lastSelectedFilePath) return;
    const shareOnInternet = document.getElementById('share-internet-check').checked;
    const btn = document.getElementById('select-file-btn');
    
    if (shareOnInternet) {
      showToast('Lade Datei hoch... Bitte warten ☁️');
    }
    
    btn.disabled = true;
    const originalText = btn.innerHTML;
    btn.innerHTML = '⏳ Verarbeite...';
    
    clearQR();
    sharedFileUrl = '';
    
    pywebview.api.share_file_local(lastSelectedFilePath, shareOnInternet).then(res => {
      btn.disabled = false;
      btn.innerHTML = originalText;
      
      if (res && res.success) {
        sharedFileUrl = res.url;
        document.getElementById('file-info-name').textContent = res.filename;
        document.getElementById('file-info-size').textContent = res.size;
        document.getElementById('file-info-box').style.display = 'block';
        if (shareOnInternet) {
          showToast('Datei im Internet freigegeben! ☁️');
        } else {
          showToast('Datei lokal freigegeben! 🌐');
        }
        generateQR();
      } else {
        showToast('Freigabe fehlgeschlagen: ' + (res.error || 'Fehler'), 'error');
      }
    }).catch(err => {
      btn.disabled = false;
      btn.innerHTML = originalText;
      showToast('Fehler: ' + err, 'error');
    });
  }

  function buildContent() {
    if (currentType === 'wifi') {
      const ssid = document.getElementById('wifi-ssid').value.trim();
      const pass = document.getElementById('wifi-pass').value;
      const sec  = currentWifiSec;
      return `WIFI:T:${sec};S:${ssid};P:${pass};;`;
    }
    if (currentType === 'email') {
      const to  = document.getElementById('email-to').value.trim();
      const sub = encodeURIComponent(document.getElementById('email-sub').value.trim());
      return `mailto:${to}?subject=${sub}`;
    }
    if (currentType === 'file') {
      return sharedFileUrl;
    }
    return document.getElementById('qr-input').value.trim();
  }

  function onInput() {
    updateCharCount();
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(generateQR, 300);
  }

  function updateCharCount() {
    const val = document.getElementById('qr-input').value;
    document.getElementById('char-count').textContent = val.length;
  }

  function generateQR() {
    if (typeof pywebview === 'undefined') return;

    const content = buildContent();
    const size    = parseInt(document.getElementById('qr-size').value);
    const fgColor = document.getElementById('fg-color').value;
    const bgColor = document.getElementById('bg-color').value;

    if (!content) {
      clearQR();
      return;
    }

    const output = document.getElementById('qr-output');
    output.style.opacity = '0.3';

    pywebview.api.generate_qr_base64(content, fgColor, bgColor, size).then(res => {
      if (res && res.success) {
        output.innerHTML = `<img id="qr-img" src="${res.base64}" style="width: ${size}px; height: ${size}px;" />`;
        hasQR = true;
        document.getElementById('download-btn').disabled = false;
        document.getElementById('stat-size').textContent = size + 'px';
        document.getElementById('stat-chars').textContent = content.length;
        document.getElementById('qr-frame').classList.add('has-qr');
      } else {
        output.innerHTML = `<p style="color:#f87171;font-size:0.8rem;text-align:center;padding:8px;">Fehler: ${res.error || 'Fehlgeschlagen'}</p>`;
        hasQR = false;
        document.getElementById('download-btn').disabled = true;
      }
      output.style.opacity = '1';
    });
  }

  function clearQR() {
    const output = document.getElementById('qr-output');
    output.innerHTML = `
      <div class="qr-placeholder" id="placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/>
          <rect x="3" y="14" width="7" height="7" rx="1.5"/>
          <rect x="5" y="5" width="3" height="3" rx="0.5" fill="currentColor" stroke="none"/>
          <rect x="16" y="5" width="3" height="3" rx="0.5" fill="currentColor" stroke="none"/>
          <rect x="5" y="16" width="3" height="3" rx="0.5" fill="currentColor" stroke="none"/>
          <path d="M14 14h2v2h-2zM16 16h2v2h-2zM18 14h2v2h-2zM14 18h2v2h-2zM18 18h2v2h-2z" fill="currentColor" stroke="none"/>
        </svg>
        <p>Dein QR-Code erscheint hier</p>
      </div>`;
    document.getElementById('qr-frame').classList.remove('has-qr');
    document.getElementById('download-btn').disabled = true;
    document.getElementById('stat-size').textContent = '—';
    document.getElementById('stat-chars').textContent = '—';
    hasQR = false;
  }

  function downloadQR() {
    if (!hasQR) return;

    const content = buildContent();
    const customName = (document.getElementById('qr-filename').value || '').trim();
    const defaultName = (customName || (() => {
      const slug = content.replace(/[^a-zA-Z0-9]/g, '-').substring(0, 30).replace(/-+$/,'');
      return `qr-${slug || 'qrcode'}`;
    })()) + '.png';
    
    const fileTypes = JSON.stringify([
      ["PNG Grafik", "*.png"],
      ["Alle Dateien", "*.*"]
    ]);

    pywebview.api.save_file_dialog(fileTypes, defaultName).then(outputPath => {
      if (!outputPath) return;

      const size    = parseInt(document.getElementById('qr-size').value);
      const fgColor = document.getElementById('fg-color').value;
      const bgColor = document.getElementById('bg-color').value;

      pywebview.api.generate_qr_code(content, fgColor, bgColor, size, outputPath).then(res => {
        if (res && res.success) {
          showToast('QR-Code erfolgreich gespeichert! 💾');
        } else {
          showToast('Fehler beim Speichern: ' + (res.error || ''), 'error');
        }
      });
    });
  }

  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast show ${type}`;
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      clearTimeout(debounceTimer);
      generateQR();
    }
  });

  window.addEventListener('pywebviewready', () => {
    // Generate initial placeholder or run if there is content
    onInput();
  });
</script>
</body>
</html>
